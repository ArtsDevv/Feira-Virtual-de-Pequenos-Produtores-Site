<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Cadastro de Produtos</title>
    <link rel="stylesheet" href="../style_global.css"> <style>
        .form-container { max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Cadastrar Novo Produto</h2>
        <form id="form-produto">
            <div class="form-group">
                <label>Nome do Produto:</label>
                <input type="text" id="nome" required placeholder="Ex: Mel Orgânico">
            </div>
            <div class="form-group">
                <label>Categoria:</label>
                <select id="categoria">
                    <option value="hortifruti">Hortifruti</option>
                    <option value="mercearia">Mercearia</option>
                    <option value="artesanato">Artesanato</option>
                </select>
            </div>
            <div class="form-group">
                <label>Preço (R$):</label>
                <input type="number" id="preco" step="0.01" required>
            </div>
            <div class="form-group">
                <label>Unidade de Medida:</label>
                <input type="text" id="unidade" placeholder="Ex: kg, un, pote" required>
            </div>
            <div class="form-group">
                <label>Descrição:</label>
                <textarea id="descricao" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>URL da Imagem:</label>
                <input type="text" id="imagem_url" placeholder="../assets/nome-da-foto.jpg">
            </div>
            <button type="submit">Salvar na Feira</button>
        </form>
        <p id="mensagem"></p>
        <a href="../index.html">← Voltar para a Loja</a>
    </div>

    <script src="admin.js"></script>
</body>
</html>
